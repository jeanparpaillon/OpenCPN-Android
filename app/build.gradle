plugins {
    id 'com.android.application'
    id 'com.google.firebase.crashlytics'
    id 'com.google.gms.google-services'
}

// ABIs to package, comma-separated, supplied by OpenCPN-builder's Makefile as
// -POCPN_ABIS. Defaults to both so a bare `./gradlew` still builds a fat APK.
// This single list drives ndk.abiFilters *and* which per-arch copy tasks run,
// so a single-arch build never references the arch it didn't build.
def ocpnAbis = ((project.findProperty('OCPN_ABIS') ?: 'armeabi-v7a,arm64-v8a') as String)
        .split(',').collect { it.trim() }.findAll { it }

android {
    compileSdkVersion 35

    defaultConfig {
        applicationId "org.opencpn.opencpn"
        minSdkVersion 21
        targetSdkVersion 36
        versionCode ((project.findProperty('OCPN_VERSION_CODE') ?: "128") as int)
        versionName (project.findProperty('OCPN_VERSION_NAME') ?: "5.14.0")
        setProperty("archivesBaseName", applicationId + "-v" + versionCode + "(" + versionName + ")")
        archivesBaseName = "$applicationId-v$versionCode($versionName)"
        ndk.abiFilters.addAll(ocpnAbis)
        compileOptions {
            sourceCompatibility JavaVersion.VERSION_1_8
            targetCompatibility JavaVersion.VERSION_1_8
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            //signingConfig signingConfigs.release
        }
        debug {
            // Install alongside a stock OpenCPN instead of colliding with it.
            // Android keys installed apps on applicationId, so the suffix gives
            // the debug build its own package name — and its own data dir, so
            // test routes/charts stay separate from the Play Store app. Two
            // things that are hardcoded to the base package rather than derived
            // from applicationId are fixed to match: the FileProvider authority
            // (src/debug/res/values/strings.xml) and a self-lookup in
            // QtActivity.java. See docs/android-build.md.
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            ndk {
                abiFilters.addAll(ocpnAbis)
                //abiFilters 'x86'
            }
        }
    }

    sourceSets {
        main {
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            jniLibs.srcDirs += ['src/main/jniLibs']
            jniLibs.srcDirs += ['src/main/libs']
        }
    }

    packagingOptions {
        //doNotStrip "*/armeabi/*.so"
        //doNotStrip "*/armeabi-v7a/*.so"
        //doNotStrip "*/x86/*.so"
        //doNotStrip "*/armeabi-v7a/libwx_qtu_core-3-1.so"
        //doNotStrip "*/armeabi-v7a/libQt5Core.so"
        //doNotStrip "*/libplugins_platforms_android_libqtforandroid.so"
        //doNotStrip "*/arm64-v8a/libopencpn.so"

        //doNotStrip "*/armeabi-v7a/libgorp.so"  // This one will break on chart1
        //doNotStrip "*/arm64-v8a/libgorp.so"  // This one will break on chart1

        //doNotStrip "**/*/*.so"  // works
        //doNotStrip "*/libocpn_draw_pi.*"
        //doNotStrip "*/libdashboard_pi.so64"
        //doNotStrip "*/libo-charts_pi.so32"
        //doNotStrip "**"
    }

    lintOptions {
        checkReleaseBuilds false
        // Or, if you prefer, you can continue to check for errors in release builds,
        // but continue the build even when errors are found:
        abortOnError false
    }
    buildToolsVersion '34.0.0'
    namespace 'org.opencpn.opencpn'

    configurations.all {
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation "androidx.activity:activity:1.6.0-alpha05"
    testImplementation 'junit:junit:4.12'
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation project(path: ':afilechooser2')
    implementation project(path: ':lobsterpicker')
    implementation project(path: ':materialfilemanager')

    //implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.gms:play-services-maps:18.1.0'
    implementation 'com.google.android.gms:play-services-location:21.0.1'
    implementation 'com.caverock:androidsvg-aar:1.4'
    implementation fileTree(dir: "$buildDir/native-libs", include: 'native-libs.jar')
    implementation 'org.apache.commons:commons-compress:1.20'
    implementation 'org.tukaani:xz:1.5'
    implementation 'com.github.anrwatchdog:anrwatchdog:1.4.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"

    implementation 'com.google.android.material:material:1.10.0' // Use the latest version

    implementation('com.google.testing.platform:android-device-provider-local:0.0.9-alpha03') {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }

    // Import the BoM for the Firebase platform
    implementation(platform("com.google.firebase:firebase-bom:32.1.1"))
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-crashlytics-ndk'

    // Where the staged artifacts come from. Supplied with -P by OpenCPN-builder
    // (see its Makefile); the defaults keep a bare `./gradlew` working from a
    // conventional side-by-side checkout.
    //
    // These were hardcoded absolute paths into one developer's home directory,
    // which also assumed the build directories lived *inside* the source tree.
    // They are separate here, so source and build are separate properties.
    def OCPN_Base = project.findProperty('OCPN_SRC') ?: "${rootDir}/../OpenCPN"
    def OCPN_Build = project.findProperty('OCPN_BUILD_ARMHF') ?: "${rootDir}/../build-android-armhf"
    def OCPN_Build_64 = project.findProperty('OCPN_BUILD_ARM64') ?: "${rootDir}/../build-android-arm64"
    def Qt_ARMHF = project.findProperty('QT_ARMHF') ?: "/usr/src/qt5/armhf"
    def Qt_ARM64 = project.findProperty('QT_ARM64') ?: "/usr/src/qt5/arm64"
    // libc++_shared.so must come from the same NDK that built libgorp.so.
    def NDK_Sysroot = project.findProperty('NDK_SYSROOT') ?: ""

    // Arch-independent artifacts (the translation .mo files) are staged once,
    // outside any per-arch tree, so the APK's languages don't depend on which
    // arch was built. OpenCPN-builder fills this via -POCPN_BUILD_ALL; the
    // default falls back to the armhf tree for a side-by-side ./gradlew.
    def OCPN_Build_All = project.findProperty('OCPN_BUILD_ALL') ?: OCPN_Build


